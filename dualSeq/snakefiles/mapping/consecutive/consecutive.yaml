name: 'consecutive'

required_settings:

  index_dir_host:
    description: 'Path to genome index output'
    type: 'directory'

  host_genome:
    description: 'Path to genome fasta file'
    type: 'file'

  host_gtf:
    description: 'Path to genome gtf/gff file'
    type: 'file'

  alignment_type:
    description: 'Choose local or end-to-end alignment'
    type: 'enum'
    choices:
      local: '--very-sensitive-local'
      end-to-end: '--very-sensitive'

    
optional_settings:

  star_sj_overhang:
    description: 'Length of genomic sequence around annotated junction [best: ReadLength-1]'
    type: 'integer'
    default: 100
      
  star_gene_tag:
    description: 'Tag name to be used as exons gene-parent (GTF: gene_id, GFF: ID)'
    type: 'string'
    default: 'gene_id'

  star_transcript_tag:
    description: 'Tag name to be used as exons transcript-parent (GTF: transcript_id, GFF: Parent)'
    type: 'string'
    default: 'transcript_id'

  star_feature_exon:
    description: 'Feature type in gtf/gff used to build transcript, e.g., exon or CDS'
    type: 'string'
    default: 'exon'

  additional_star_options:
    description: 'Additional options to use in shell command'
    type: 'string'
    default: ''

  mem_mb_star:
    description: "Memory requirement"
    type: "string"
    default: "35000" 

  threads_idx_host:
    description: 'Number of threads for index generation'
    type: 'integer'
    default: 8

  threads_mapping_host:
    description: 'Number of threads for index generation'
    type: 'integer'
    default: 6 

  additional_bowtie2_options:
    description: "Additional options to use in shell command"
    type: "string"

  mem_mb_bowtie2:
    description: "Memory requirement"
    type: "string"
    default: "2000" 

  threads_idx_virus:
    description: 'Number of threads for index generation'
    type: 'integer'
    default: 8

  threads_mapping_virus:
    description: 'Number of threads for index generation'
    type: 'integer'
    default: 6 

single_end:
  snakefile: 'consecutive'

paired_end:
  snakefile: 'star_pe'
