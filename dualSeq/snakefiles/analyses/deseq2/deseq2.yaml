name: "deseq2"

required_settings:
  gff_feature_type_virus:
    description: "Used feature type, e.g. gene or exon"
    type: "string"

  gff_feature_name_virus:
    description: "Descriptor for gene name, e.g. ID or gene_id"
    type: "string"
  gff_feature_type_human:
    description: "Used feature type, e.g. gene or exon"
    type: "string"

  gff_feature_name_human:
    description: "Descriptor for gene name, e.g. ID or gene_id"
    type: "string"

  gff_human:
    description: "File path to gff file"
    type: "file"
    
  comparisons_human:
    description: "File path to comparisons file for host"
    type: "file"
  
  
optional_settings:
  additional_featcounts_options:
    description: "Additional options to use in shell command"
    type: "string"
    default: ""

  attribute_columns:
    description: "GFF attributes to show in the beginning of the xlsx summary"
    type: "string"
    default: ""

  color:
    description: "File path to table assigning a color to each virus"
    type: "file"
    default: "NULL"

  rRNA:
    description: "Path to list of rRNA genes"
    type: "file"
    default: "NULL"

  db:
    description: "Database(s) used for functional analysis, has to be one or more of KEGG, GO and Reactome. Default: KEGG"
    type: "string"
    default: "KEGG"

  ont:
    description: "If db=GO, GO ontologies used in functional analysis"
    type: "string"
    default: "BP"

  mem_mb:
    description: "Memory requirement"
    type: "string"
    default: "2000"


columns:
  condition:
    description: "Condition name of sequencing run"
    type: "string"
  #color:
  #  description: "Virus color for plots"
  #  type: "string"


single_end:
  snakefile: "deseq2_se"


paired_end:
  snakefile: "deseq2_pe"


