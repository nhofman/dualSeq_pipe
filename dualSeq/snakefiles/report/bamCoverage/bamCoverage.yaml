name: bamCoverage

required_settings:
  effectiveGenomeSize_host:
    description: "Length of the mappable genome"
    type: "string"

optional_settings:
  normMethod_host:
    description: "Normalization method for host data (RPKM, CPM, BPM, RPGC, None)"
    type: "string"
    default: "None"

  binSize_host:
    description: "Bin size in bases for the human data"
    type: "string"
    default: 50

  normMethod_virus:
    description: "Normalization method for virus data (RPKM, CPM, BPM, RPGC, None)"
    type: "string"
    default: "None"

  binSize_virus:
    description: "Bin size in bases for virus data"
    type: "string"
    default: 50

  additional_bamcoverage_options_host:
    description: "Additional options to use in shell command"
    type: "string"
    default: ""
    
  additional_bamcoverage_options_virus:
    description: "Additional options to use in shell command"
    type: "string"
    default: ""

  mem_mb_host:
    description: "Memory requirement for host"
    type: "string"
    default: "2000"

  mem_mb_virus:
    description: "Memory requirement for virus"
    type: "string"
    default: "2000"

single_end:
  snakefile: "bamCoverage"

paired_end:
  snakefile: "bamCoverage"
